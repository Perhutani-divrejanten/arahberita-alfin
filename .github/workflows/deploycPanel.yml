name: Deploy ke cPanel

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # otomatis update setiap 6 jam

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        run: node tools/generate.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 195.88.211.130
          username: deploy@wartajanten.net
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ./
          timeout: 60000
          exclude: |
            **/.git*
            **/node_modules/**
            **/.github/**
